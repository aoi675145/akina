name: FreeMcServer-warp 续期

on:
  schedule:
    # 每 2 小时 30 分运行一次
    - cron: '30 */2 * * *'
  workflow_dispatch:

jobs:
  renew:
    name: 执行续订
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg dnsmasq xdotool unzip
          pip install -q seleniumbase requests pyvirtualdisplay

      - name: 修复 DNS
        run: |
          echo "🔧 配置 DNS..."
          
          # 停掉 systemd-resolved
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          
          # 删掉软链接，写真实文件
          sudo rm -f /etc/resolv.conf
          
          # 写多个 DNS 服务器
          cat > /tmp/resolv.conf << 'EOF'
          nameserver 1.1.1.1
          nameserver 8.8.8.8
          nameserver 1.0.0.1
          nameserver 8.8.4.4
          options timeout:2 attempts:3
          EOF
          sudo tee /etc/resolv.conf < /tmp/resolv.conf > /dev/null
          
          # 防止被覆盖
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          
          # 等 DNS 生效
          sleep 3
          
          echo "🔍 DNS 测试:"
          echo "--- freemcserver.net ---"
          dig freemcserver.net +short @1.1.1.1 || echo "⚠️ 解析失败"
          echo "--- panel.freemcserver.net ---"
          dig panel.freemcserver.net +short @1.1.1.1 || echo "⚠️ 解析失败"
          
          echo ""
          echo "📄 /etc/resolv.conf:"
          cat /etc/resolv.conf

      - name: 安装并启动代理
        env:
          freemc_PROXY_NODE: ${{ secrets.freemc_PROXY_NODE }}
        run: |
          if [ -z "${freemc_PROXY_NODE}" ]; then
            echo "[ERROR] freemc_PROXY_NODE 未配置，禁止直连"
            exit 1
          fi

          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          mkdir -p xray-bin
          unzip -oq Xray-linux-64.zip -d xray-bin
          chmod +x xray-bin/xray

          python3 << 'PYEOF'
          import base64
          import json
          import os
          from urllib.parse import parse_qs, unquote, urlparse

          proxy_url = os.environ["freemc_PROXY_NODE"].strip()
          parsed = urlparse(proxy_url)
          scheme = parsed.scheme

          if scheme not in {"vless", "vmess"}:
              raise SystemExit(f"Unsupported proxy scheme: {scheme}")

          def truthy(value):
              return str(value).lower() in {"1", "true", "yes"}

          def build_stream_settings(query, host):
              transport_type = query.get("type", "tcp")
              if transport_type == "h2":
                  transport_type = "http"

              stream_settings = {
                  "network": transport_type,
                  "security": query.get("security", "none"),
              }

              if stream_settings["security"] == "reality":
                  reality = {
                      "serverName": query.get("sni", host),
                      "fingerprint": query.get("fp", "chrome"),
                      "publicKey": query.get("pbk", ""),
                  }
                  if query.get("sid"):
                      reality["shortId"] = query["sid"]
                  if query.get("spx"):
                      reality["spiderX"] = query["spx"]
                  stream_settings["realitySettings"] = reality
              elif stream_settings["security"] == "tls":
                  stream_settings["tlsSettings"] = {
                      "serverName": query.get("sni", host),
                      "fingerprint": query.get("fp", "chrome"),
                      "allowInsecure": truthy(query.get("allowInsecure", query.get("insecure", "0"))),
                  }

              if transport_type == "tcp":
                  stream_settings["tcpSettings"] = {
                      "header": {"type": query.get("headerType", "none")}
                  }
              elif transport_type == "ws":
                  headers = {}
                  if query.get("host"):
                      headers["Host"] = query["host"]
                  stream_settings["wsSettings"] = {
                      "path": query.get("path", "/"),
                      "headers": headers,
                  }
              elif transport_type == "http":
                  stream_settings["httpSettings"] = {
                      "host": [h for h in query.get("host", "").split(",") if h],
                      "path": query.get("path", "/"),
                  }
              elif transport_type == "grpc":
                  stream_settings["grpcSettings"] = {
                      "serviceName": query.get("serviceName", ""),
                      "authority": query.get("authority", ""),
                  }

              return stream_settings

          if scheme == "vless":
              qs = {k: v[-1] for k, v in parse_qs(parsed.query).items()}
              host = parsed.hostname
              port = parsed.port
              user_id = unquote(parsed.username or "")

              if not host or not port or not user_id:
                  raise SystemExit("Invalid VLESS URL: missing host, port, or uuid")

              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{
                              "id": user_id,
                              "encryption": qs.get("encryption", "none"),
                              "flow": qs.get("flow", ""),
                          }],
                      }]
                  },
                  "streamSettings": build_stream_settings(qs, host),
              }
          else:
              payload = parsed.netloc + parsed.path
              padded = payload + "=" * (-len(payload) % 4)
              vmess = json.loads(base64.urlsafe_b64decode(padded).decode("utf-8"))
              host = vmess.get("add")
              port = int(vmess.get("port", 0))
              user_id = vmess.get("id", "")
              if not host or not port or not user_id:
                  raise SystemExit("Invalid VMess URL: missing host, port, or uuid")

              query = {
                  "type": vmess.get("net", "tcp"),
                  "security": vmess.get("tls", "none"),
                  "path": vmess.get("path", "/") or "/",
                  "host": vmess.get("host", ""),
                  "sni": vmess.get("sni", "") or host,
                  "fp": vmess.get("fp", "chrome"),
                  "allowInsecure": vmess.get("allowInsecure", vmess.get("insecure", "0")),
                  "serviceName": vmess.get("path", ""),
                  "authority": vmess.get("host", ""),
                  "headerType": vmess.get("type", "none") or "none",
              }

              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{
                              "id": user_id,
                              "alterId": int(vmess.get("aid", 0) or 0),
                              "security": vmess.get("scy", "auto"),
                          }],
                      }]
                  },
                  "streamSettings": build_stream_settings(query, host),
              }

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [{
                  "listen": "127.0.0.1",
                  "port": 8080,
                  "protocol": "http",
              }],
              "outbounds": [outbound],
          }

          with open("xray-config.json", "w", encoding="ascii") as f:
              json.dump(config, f, indent=2)
          PYEOF

          ./xray-bin/xray run -c xray-config.json > xray.log 2>&1 &
          sleep 2
          ./xray-bin/xray version

          if curl -fsS --max-time 15 --proxy "http://127.0.0.1:8080" https://api.ipify.org >/tmp/freemc_proxy_ip; then
            python3 - <<'PYEOF'
          ip = open("/tmp/freemc_proxy_ip", encoding="utf-8").read().strip()
          parts = ip.split(".")
          if len(parts) == 4:
              ip = f"{parts[0]}.{parts[1]}.***.{parts[3]}"
          elif len(ip) > 8:
              ip = f"{ip[:4]}***{ip[-4:]}"
          else:
              ip = "***"
          print(f"[INFO] ✅ 代理可用，出口 IP: {ip}")
          PYEOF
            echo "PROXY_SERVER=http://127.0.0.1:8080" >> "$GITHUB_ENV"
          else
            echo "[ERROR] ❌ 代理不可用，禁止直连"
            cat xray.log
            exit 1
          fi

      - name: 检查脚本代理出口
        run: |
          if [ -z "${PROXY_SERVER}" ]; then
            echo "[ERROR] PROXY_SERVER 为空，禁止直连"
            exit 1
          fi

          echo "[INFO] 检查代理出口 IP..."
          curl -fsS --max-time 20 --proxy "${PROXY_SERVER}" https://api.ipify.org >/tmp/freemc_check_ip
          python3 - <<'PYEOF'
          ip = open("/tmp/freemc_check_ip", encoding="utf-8").read().strip()
          parts = ip.split(".")
          if len(parts) == 4:
              ip = f"{parts[0]}.{parts[1]}.***.{parts[3]}"
          elif len(ip) > 8:
              ip = f"{ip[:4]}***{ip[-4:]}"
          else:
              ip = "***"
          print(f"[INFO] 代理出口 IP: {ip}")
          PYEOF

          echo "[INFO] 检查代理访问 FreeMcServer..."
          curl -fsSI --max-time 30 --proxy "${PROXY_SERVER}" https://panel.freemcserver.net/ | sed -n '1,8p'

      - name: 执行续订脚本
        env:
          FREEMCSERVER: ${{ secrets.FREEMCSERVER }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}
        run: |
          python scripts/FreeMcServer/main.py

#      - name: 上传截图
#        if: always()
#        uses: actions/upload-artifact@v4
#        with:
#          name: screenshots-${{ github.run_number }}
#          path: output/screenshots/*.png
#          retention-days: 7
#          if-no-files-found: ignore

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
