name: Bytenut 续期

on:
#  schedule:
#   - cron: '16 16 * * *' 
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  run_renewal:
    name: 运行续期脚本
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 拉取私库脚本
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          if [ -z "$REPO_TOKEN" ]; then
            echo "[ERROR] 未配置 REPO_TOKEN，无法拉取私库脚本"
            exit 1
          fi

          curl -fsSL \
            -H "Authorization: Bearer $REPO_TOKEN" \
            -H "Accept: application/vnd.github.raw" \
            -o main.py \
            "https://api.github.com/repos/aoi675145/scripts/contents/scripts/bytenut/main.py?ref=main"

          test -s main.py || { echo "[ERROR] 私库脚本拉取失败或文件为空"; exit 1; }
          echo "[INFO] 私库脚本已拉取: scripts/bytenut/main.py"

      - name: 安装依赖项
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 安装并启动代理
        id: proxy
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "use_proxy=false" >> $GITHUB_OUTPUT
            echo "proxy_server=" >> $GITHUB_OUTPUT
            echo "[INFO] 未配置代理，直连模式"
            exit 0
          fi

          wget -q https://github.com/aoi675145/akina/releases/download/proxy/Xray-linux-64.zip
          mkdir -p xray-bin
          unzip -oq Xray-linux-64.zip -d xray-bin
          chmod +x xray-bin/xray
          sudo mv xray-bin/xray /usr/local/bin/xray

          if ! python3 << 'PYEOF'
          import base64
          import json
          import os
          import sys
          from urllib.parse import parse_qs, unquote, urlparse

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          def pick(query, key, default=""):
              value = query.get(key, default)
              return value[-1] if isinstance(value, list) else value

          def build_stream_settings(query, host):
              transport_type = pick(query, "type", "tcp")
              if transport_type == "h2":
                  transport_type = "http"

              security = pick(query, "security", "none")
              stream_settings = {
                  "network": transport_type,
                  "security": security,
              }

              if security == "reality":
                  reality = {
                      "serverName": pick(query, "sni", host),
                      "fingerprint": pick(query, "fp", "chrome"),
                      "publicKey": pick(query, "pbk", ""),
                  }
                  if pick(query, "sid"):
                      reality["shortId"] = pick(query, "sid")
                  if pick(query, "spx"):
                      reality["spiderX"] = pick(query, "spx")
                  stream_settings["realitySettings"] = reality
              elif security == "tls":
                  tls_settings = {
                      "serverName": pick(query, "sni", host),
                      "fingerprint": pick(query, "fp", "chrome"),
                  }
                  if pick(query, "allowInsecure") or pick(query, "insecure"):
                      tls_settings["allowInsecure"] = pick(query, "allowInsecure", pick(query, "insecure")) in ("1", "true", "True", "yes")
                  stream_settings["tlsSettings"] = tls_settings

              if transport_type == "tcp":
                  stream_settings["tcpSettings"] = {
                      "header": {"type": pick(query, "headerType", "none")}
                  }
              elif transport_type == "ws":
                  headers = {}
                  if pick(query, "host"):
                      headers["Host"] = pick(query, "host")
                  stream_settings["wsSettings"] = {
                      "path": pick(query, "path", "/") or "/",
                      "headers": headers,
                  }
              elif transport_type == "http":
                  stream_settings["httpSettings"] = {
                      "host": [h for h in pick(query, "host", "").split(",") if h],
                      "path": pick(query, "path", "/") or "/",
                  }
              elif transport_type == "grpc":
                  stream_settings["grpcSettings"] = {
                      "serviceName": pick(query, "serviceName", ""),
                      "authority": pick(query, "authority", ""),
                  }

              return stream_settings

          proxy_url = os.environ.get("PROXY_NODE", "").strip()
          parsed = urlparse(proxy_url)
          scheme = parsed.scheme.lower()

          if scheme == "vless":
              qs = parse_qs(parsed.query)
              host = parsed.hostname
              port = parsed.port
              user_id = unquote(parsed.username or "")
              if not host or not port or not user_id:
                  raise SystemExit("Invalid VLESS URL: missing host, port, or uuid")

              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{
                              "id": user_id,
                              "encryption": pick(qs, "encryption", "none"),
                              "flow": pick(qs, "flow", ""),
                          }],
                      }]
                  },
                  "streamSettings": build_stream_settings(qs, host),
              }
              print(f"[INFO] VLESS -> {mask(host)}:{port}")
          elif scheme == "vmess":
              payload = parsed.netloc + parsed.path
              padded = payload + "=" * (-len(payload) % 4)
              vmess = json.loads(base64.urlsafe_b64decode(padded).decode("utf-8"))
              host = vmess.get("add")
              port = int(vmess.get("port", 0))
              user_id = vmess.get("id", "")
              if not host or not port or not user_id:
                  raise SystemExit("Invalid VMess URL: missing host, port, or uuid")

              query = {
                  "type": vmess.get("net", "tcp"),
                  "security": vmess.get("tls", "none") or "none",
                  "path": vmess.get("path", "/") or "/",
                  "host": vmess.get("host", ""),
                  "sni": vmess.get("sni", "") or host,
                  "fp": vmess.get("fp", "chrome"),
                  "serviceName": vmess.get("path", ""),
                  "authority": vmess.get("host", ""),
                  "headerType": vmess.get("type", "none") or "none",
              }
              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{
                              "id": user_id,
                              "alterId": int(vmess.get("aid", 0) or 0),
                              "security": vmess.get("scy", "auto") or "auto",
                          }],
                      }]
                  },
                  "streamSettings": build_stream_settings(query, host),
              }
              print(f"[INFO] VMess -> {mask(host)}:{port} (network: {query['type']}, tls: {query['security']})")
          else:
              raise SystemExit(f"Unsupported proxy scheme: {scheme}")

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [{
                  "listen": "127.0.0.1",
                  "port": 8080,
                  "protocol": "http",
              }],
              "outbounds": [outbound],
          }

          with open("xray_config.json", "w", encoding="ascii") as f:
              json.dump(config, f, indent=2)
          print("[INFO] ✅ 代理配置已生成")
          PYEOF
          then
            echo "[WARN] 代理节点解析失败，回退直连"
            echo "use_proxy=false" >> $GITHUB_OUTPUT
            echo "proxy_server=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 启动 Xray 并测试连通性
          xray run -c xray_config.json > xray.log 2>&1 &
          sleep 3

          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            if curl -fsS --connect-timeout 10 --max-time 30 --proxy http://127.0.0.1:8080 https://api.ipify.org; then
              echo
              echo "proxy_server=http://127.0.0.1:8080" >> $GITHUB_OUTPUT
              echo "use_proxy=true" >> $GITHUB_OUTPUT
              echo "[INFO] ✅ 代理连接成功"
              exit 0
            fi
            echo "[WARN] 尝试 $i/5..."
            sleep 3
          done

          # 代理启动失败，仍输出直连，不中断工作流
          echo "[ERROR] ❌ 代理连接失败，回退直连"
          echo "[INFO] Xray 日志："
          sed -n '1,120p' xray.log || true
          echo "use_proxy=false" >> $GITHUB_OUTPUT
          echo "proxy_server=" >> $GITHUB_OUTPUT

      - name: 运行续期脚本
        env:
          BYTENUT: ${{ secrets.BYTENUT }}
          bytenut_ACCOUNTS: ${{ secrets.BYTENUT }}
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY: ${{ steps.proxy.outputs.proxy_server }}
          BYTENUT_NETWORK_MODE: ${{ steps.proxy.outputs.use_proxy == 'true' && '代理' || '直连' }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq xvfb
          xvfb-run -a python3 main.py

      - name: 清理历史
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
