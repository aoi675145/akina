name: godlike warp 续期
on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 */6 * * *'
permissions:
  actions: write
  contents: read
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
      - name: 检出私有脚本仓库
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: private-repo
      - name: 设置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装系统和识别依赖
        run: |
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends -o Acquire::Retries=3 xvfb unzip curl xz-utils
          curl -L --retry 3 --connect-timeout 10 \
            -o /tmp/ffmpeg-release-amd64-static.tar.xz \
            https://github.com/akina005/akina/releases/download/ffmpeg/ffmpeg-release-amd64-static.tar.xz
          tar -xf /tmp/ffmpeg-release-amd64-static.tar.xz -C /tmp
          sudo install -m 755 /tmp/ffmpeg-*-amd64-static/ffmpeg /usr/local/bin/ffmpeg
          sudo install -m 755 /tmp/ffmpeg-*-amd64-static/ffprobe /usr/local/bin/ffprobe
          ffmpeg -version
          ffprobe -version
      - name: 安装 Python 识别依赖
        run: |
          python -m pip install --upgrade pip
          pip install SpeechRecognition pydub
      - name: 安装 Playwright 浏览器
        timeout-minutes: 10
        run: |
          cd private-repo/scripts/godlike
          npm install
          npx playwright install chromium
      - name: 启用 WARP 网络
        timeout-minutes: 10
        continue-on-error: true
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client
      - name: 修复 DNS 并检查出口 IP
        run: |
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          printf "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1\n" | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 2
          for i in {1..30}; do
            status=$(curl -s --max-time 5 https://www.cloudflare.com/cdn-cgi/trace | grep -oP 'warp=\K\w+' || echo unknown)
            [[ "$status" =~ ^(on|plus)$ ]] && echo "WARP 已连接" && break
            echo "WARP 连接中... ($i/30)"
            sleep 2
          done
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true
      - name: 执行自动续期脚本
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p private-repo/scripts/godlike/screenshots
          xvfb-run -a node private-repo/scripts/godlike/warp.js
      - name: 清理旧的工作流运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 4
