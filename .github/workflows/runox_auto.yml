name: Runox 自动续期

on:
  #schedule:
  #  - cron: '5 * * * *'   # 每小时第 05 分执行
  workflow_dispatch:        # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出工作流仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}
          path: workflow-repo

      - name: 检出私库脚本
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: private-repo

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          missing=""
          command -v xvfb-run >/dev/null 2>&1 || missing="$missing xvfb"
          command -v unzip >/dev/null 2>&1 || missing="$missing unzip"
          if [ -n "$missing" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y $missing
          else
            echo "[INFO] 系统依赖已存在，跳过 apt 安装"
          fi

      - name: 安装并测试代理
        env:
          RUNOX_PROXY_NODE: ${{ secrets.RUNOX_PROXY_NODE }}
        run: |
          if [ -z "$RUNOX_PROXY_NODE" ]; then
            echo "[INFO] 未配置 RUNOX_PROXY_NODE，直连模式"
            exit 0
          fi

          echo "::add-mask::${RUNOX_PROXY_NODE}"
          curl -fsSL https://github.com/akina005/akina/releases/download/proxy/Xray-linux-64.zip -o Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray
          chmod +x xray/xray

          python3 <<'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("RUNOX_PROXY_NODE", "").strip()
          if not url:
              print("[INFO] RUNOX_PROXY_NODE 为空，跳过代理")
              sys.exit(0)

          if url.startswith("vless://"):
              protocol = "vless"
              content = url[8:]
          elif url.startswith("vmess://"):
              protocol = "vmess"
              content = url[8:]
          elif url.startswith("socks5://") or url.startswith("socks://"):
              content = url.split("://", 1)[1].split("#", 1)[0]
              with open("use_external_socks.txt", "w") as f:
                  f.write(url.split("#", 1)[0])
              server = content.split("@")[-1].split(":")[0]
              print(f"[INFO] SOCKS5 -> {mask(server)}")
              sys.exit(0)
          else:
              print(f"[WARN] 不支持的代理协议，回退直连: {url.split('://')[0] if '://' in url else 'unknown'}")
              sys.exit(2)

          if "#" in content:
              content = content.rsplit("#", 1)[0]

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [
                  {"port": 1080, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}},
                  {"port": 1081, "listen": "127.0.0.1", "protocol": "http"}
              ],
              "outbounds": []
          }

          if protocol == "vless":
              uuid, rest = content.split("@", 1)
              host_port, params_str = rest.split("?", 1) if "?" in rest else (rest, "")
              address, port = host_port.rsplit(":", 1) if ":" in host_port else (host_port, "443")
              params = parse_qs(params_str)
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              flow = params.get("flow", [""])[0]
              pbk = params.get("pbk", [""])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": int(port),
                          "users": [{"id": uuid, "encryption": "none"}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": security
                  }
              }
              if flow:
                  outbound["settings"]["vnext"][0]["users"][0]["flow"] = flow
              if security == "reality":
                  outbound["streamSettings"]["realitySettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "publicKey": pbk
                  }
              elif security == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "allowInsecure": False
                  }
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }
              elif network == "grpc":
                  outbound["streamSettings"]["grpcSettings"] = {
                      "serviceName": params.get("serviceName", [""])[0]
                  }
              print(f"[INFO] VLESS -> {mask(address)}:{port}")
              config["outbounds"].append(outbound)

          elif protocol == "vmess":
              try:
                  padding = 4 - len(content) % 4
                  if padding != 4:
                      content += "=" * padding
                  vm = json.loads(base64.b64decode(content).decode("utf-8"))
              except Exception as e:
                  print(f"[WARN] VMess 解析失败，回退直连: {e}")
                  sys.exit(2)
              address = vm.get("add", "")
              port = int(vm.get("port", 443))
              uuid = vm.get("id", "")
              aid = int(vm.get("aid", 0))
              network = vm.get("net", "tcp")
              tls = vm.get("tls", "")
              sni = vm.get("sni", "") or vm.get("host", address)
              host = vm.get("host", address)
              path = vm.get("path", "/")
              fp = vm.get("fp", "chrome")
              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": port,
                          "users": [{"id": uuid, "alterId": aid, "security": "auto"}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": "tls" if tls == "tls" else "none"
                  }
              }
              if tls == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "allowInsecure": False
                  }
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }
              print(f"[INFO] VMess -> {mask(address)}:{port}")
              config["outbounds"].append(outbound)

          with open("xray_config.json", "w") as f:
              json.dump(config, f, indent=2)
          print("[INFO] ✅ 代理配置已生成")
          PYEOF

          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY=$EXTERNAL_SOCKS" >> "$GITHUB_ENV"
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi

          if [ ! -f "xray_config.json" ]; then
            echo "[WARN] 未生成 xray 配置，回退直连"
            exit 0
          fi

          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5

          for i in 1 2 3 4 5; do
            if curl -x socks5h://127.0.0.1:1080 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "PROXY=socks5://127.0.0.1:1080" >> "$GITHUB_ENV"
              echo "[INFO] ✅ 代理连接成功，使用本地 SOCKS5"
              exit 0
            fi
            echo "[WARN] 代理测试失败，重试 ${i}/5"
            sleep 3
          done

          echo "[WARN] 代理连接失败，回退直连"
          [ -f xray.log ] && cat xray.log || true
          exit 0

      - name: 安装 Python 依赖
        run: |
          pip install seleniumbase requests pyautogui

      - name: 安装 ChromeDriver
        run: |
          seleniumbase install chromedriver

      - name: 运行续期脚本
        working-directory: private-repo/scripts/runox
        env:
          RUNOX_ACCOUNTS: ${{ secrets.RUNOX_ACCOUNTS }}
          PROXY: ${{ env.PROXY }}
          BOT_TOKEN:       ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "::add-mask::${RUNOX_ACCOUNTS}"
          echo "::add-mask::${BOT_TOKEN}"
          echo "::add-mask::${TG_CHAT_ID}"
          IFS=',' read -ra accounts <<< "${RUNOX_ACCOUNTS}"
          for acc in "${accounts[@]}"; do
            email="${acc%%:*}"
            password="${acc#*:}"
            [ -n "${email}" ] && echo "::add-mask::${email}"
            [ -n "${password}" ] && echo "::add-mask::${password}"
          done
          xvfb-run -a python runox_auto.py

      - name: 保存 Cookie 到私库
        if: always()
        working-directory: private-repo
        run: |
          git config user.name "Auto Bot"
          git config user.email "bot@github.com"
          git add scripts/runox/cookies/*.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "✅ Cookie 没有变化，跳过提交。"
          else
            echo "🍪 检测到 Cookie 更新，正在推送到私库..."
            git commit -m "Update runox cookies [skip ci]"
            git push || {
              echo "远端有新提交，拉取后重试推送..."
              git pull --rebase
              git push
            }
          fi

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 6
