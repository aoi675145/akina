name: Icehost Auto Renew
on:
  workflow_dispatch:
  # schedule:
  #   - cron: '42 4 1 5 *' # 下一个: 2026-05-01 04:42 UTC

jobs:
  run_renewal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: write

    steps:
      - name: 📥 拉取当前仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}

      - name: 📥 拉取私有脚本仓库
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          ref: main
          path: private-scripts
          token: ${{ secrets.REPO_TOKEN }}

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安装底层依赖与浏览器
        run: |
          # 【核心】安装 xdotool(用于物理点击) 和 xvfb(虚拟屏幕)
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool
          
          # 安装 SeleniumBase 并初始化 Chrome
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🛡️ 安装并启动代理
        env:
          Ice_PROXY_NODE: ${{ secrets.Ice_PROXY_NODE }}
        run: |
          echo "::add-mask::$Ice_PROXY_NODE"
          if [ -z "$Ice_PROXY_NODE" ]; then
            echo "[INFO] 未配置代理，直连模式"
            exit 0
          fi

          wget -q https://github.com/oyz6/action/releases/download/proxy/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray
          chmod +x xray/xray

          python3 << 'PYEOF'
          import os
          import sys
          import json
          import base64
          from urllib.parse import parse_qs, unquote

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("Ice_PROXY_NODE", "").strip()
          if not url:
              print("[ERROR] Ice_PROXY_NODE 为空")
              sys.exit(1)

          if url.startswith("vless://"):
              protocol = "vless"
              content = url[8:]
          elif url.startswith("vmess://"):
              protocol = "vmess"
              content = url[8:]
          elif url.startswith("trojan://"):
              protocol = "trojan"
              content = url[9:]
          elif url.startswith("ss://"):
              protocol = "ss"
              content = url[5:]
          elif url.startswith("socks5://") or url.startswith("socks://"):
              protocol = "socks5"
              content = url.split("://", 1)[1].split("#", 1)[0]
              if "@" in content:
                  server = content.split("@", 1)[1].split(":", 1)[0]
              else:
                  server = content.split(":", 1)[0]
              print(f"[INFO] SOCKS5 -> {mask(server)}")
              with open("use_external_socks.txt", "w", encoding="utf-8") as f:
                  f.write(url.split("#", 1)[0])
              sys.exit(0)
          else:
              print(f"[ERROR] 不支持的协议: {url.split('://', 1)[0]}")
              sys.exit(1)

          if "#" in content:
              content = content.rsplit("#", 1)[0]

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [
                  {"port": 1080, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}},
                  {"port": 1081, "listen": "127.0.0.1", "protocol": "http"}
              ],
              "outbounds": []
          }

          if protocol == "vless":
              uuid, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""

              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"

              params = parse_qs(params_str)
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              flow = params.get("flow", [""])[0]
              pbk = params.get("pbk", [""])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              insecure = params.get("insecure", params.get("allowInsecure", ["0"]))[0]
              allow_insecure = str(insecure).lower() in ("1", "true", "yes")

              print(f"[INFO] VLESS -> {mask(address)}:{port} (security: {security}, network: {network})")

              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": int(port),
                          "users": [{"id": uuid, "encryption": "none"}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": security
                  }
              }

              if flow:
                  outbound["settings"]["vnext"][0]["users"][0]["flow"] = flow

              if security == "reality":
                  outbound["streamSettings"]["realitySettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "publicKey": pbk
                  }
              elif security == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "allowInsecure": allow_insecure
                  }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }
              elif network == "grpc":
                  service_name = params.get("serviceName", [""])[0]
                  outbound["streamSettings"]["grpcSettings"] = {
                      "serviceName": service_name
                  }

              config["outbounds"].append(outbound)

          elif protocol == "vmess":
              try:
                  padding = 4 - len(content) % 4
                  if padding != 4:
                      content += "=" * padding
                  decoded = base64.b64decode(content).decode("utf-8")
                  vm = json.loads(decoded)
              except Exception as e:
                  print(f"[ERROR] VMess 解析失败: {e}")
                  sys.exit(1)

              address = vm.get("add", "")
              port = int(vm.get("port", 443))
              uuid = vm.get("id", "")
              aid = int(vm.get("aid", 0))
              network = vm.get("net", "tcp")
              tls = vm.get("tls", "")
              sni = vm.get("sni", "") or vm.get("host", address)
              host = vm.get("host", address)
              path = vm.get("path", "/")
              fp = vm.get("fp", "chrome")

              print(f"[INFO] VMess -> {mask(address)}:{port} (network: {network}, tls: {tls})")

              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": port,
                          "users": [{"id": uuid, "alterId": aid, "security": "auto"}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": "tls" if tls == "tls" else "none"
                  }
              }

              if tls == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "allowInsecure": False
                  }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }

              config["outbounds"].append(outbound)

          elif protocol == "trojan":
              password, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""

              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"

              params = parse_qs(params_str)
              sni = params.get("sni", [address])[0]
              network = params.get("type", ["tcp"])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              fp = params.get("fp", ["chrome"])[0]

              print(f"[INFO] Trojan -> {mask(address)}:{port} (network: {network})")

              outbound = {
                  "protocol": "trojan",
                  "settings": {
                      "servers": [{
                          "address": address,
                          "port": int(port),
                          "password": password
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": "tls",
                      "tlsSettings": {
                          "serverName": sni,
                          "fingerprint": fp,
                          "allowInsecure": False
                      }
                  }
              }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }

              config["outbounds"].append(outbound)

          elif protocol == "ss":
              try:
                  if "@" in content:
                      encoded, server_part = content.split("@", 1)
                      decoded = base64.b64decode(encoded + "==").decode("utf-8")
                      method, password = decoded.split(":", 1)
                      address, port = server_part.split(":", 1)
                  else:
                      decoded = base64.b64decode(content + "==").decode("utf-8")
                      if "@" in decoded:
                          user_part, server_part = decoded.split("@", 1)
                          method, password = user_part.split(":", 1)
                          address, port = server_part.split(":", 1)
                      else:
                          raise ValueError("无法解析")
              except Exception as e:
                  print(f"[ERROR] Shadowsocks 解析失败: {e}")
                  sys.exit(1)

              print(f"[INFO] Shadowsocks -> {mask(address)}:{port}")

              outbound = {
                  "protocol": "shadowsocks",
                  "settings": {
                      "servers": [{
                          "address": address,
                          "port": int(port),
                          "method": method,
                          "password": password
                      }]
                  }
              }

              config["outbounds"].append(outbound)

          with open("xray_config.json", "w", encoding="utf-8") as f:
              json.dump(config, f, indent=2)

          print("[INFO] ✅ 代理配置已生成")
          PYEOF

          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY_SERVER=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi

          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5

          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            if curl -x socks5://127.0.0.1:1080 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "[INFO] ✅ 代理连接成功"
              echo "PROXY_SERVER=socks5://127.0.0.1:1080" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 尝试 $i/5..."
            sleep 3
          done

          echo "[ERROR] ❌ 代理连接失败，请检查节点是否可用"
          exit 1

      - name: 🚀 运行 Icehost Python 脚本
        env:
          Icehost: ${{ secrets.Icehost }}
          ICEHOST_SESSION: ${{ secrets.ICEHOST_SESSION }}
          Ice_PROXY_NODE: ${{ env.PROXY_SERVER }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "::add-mask::$ICEHOST_SESSION"
          echo "::add-mask::$Ice_PROXY_NODE"
          echo "::add-mask::$BOT_TOKEN"
          echo "::add-mask::$TG_CHAT_ID"
          # 使用 xvfb-run 分配虚拟屏幕，让 xdotool 能够正常点击
          xvfb-run -a python private-scripts/scripts/Icehost/main.py 2>&1 | tee renew.log

      - name: 自动修改下一次运行时间
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
          WORKFLOW_FILE: .github/workflows/Icehost.yml
        run: |
          python3 << 'EOF'
          import os
          import re
          from datetime import datetime, timedelta

          workflow_file = os.environ.get("WORKFLOW_FILE")
          now_utc = datetime.utcnow()

          with open("renew.log", "r", encoding="utf-8") as f:
              log_content = f.read()

          match = re.search(r"NEXT_RUN_UTC:\s*(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2})", log_content)
          if match:
              target_date = datetime.strptime(match.group(1), "%Y-%m-%d %H:%M")
          else:
              target_date = now_utc + timedelta(hours=4)

          if target_date <= now_utc:
              target_date = now_utc + timedelta(hours=1)

          new_cron = f"{target_date.minute} {target_date.hour} {target_date.day} {target_date.month} *"
          next_date_str = f"{target_date.strftime('%Y-%m-%d %H:%M')} UTC"

          with open(workflow_file, "r", encoding="utf-8") as f:
              content = f.read()

          new_content = re.sub(
              r"- cron: '.*?'.*",
              f"- cron: '{new_cron}' # 下一个: {next_date_str}",
              content,
              count=1,
          )

          with open(workflow_file, "w", encoding="utf-8") as f:
              f.write(new_content)

          print(f"✅ 已更新下一次运行时间: {new_cron} ({next_date_str})")
          EOF

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $WORKFLOW_FILE
          git commit -m "auto: update Icehost renewal schedule" || echo "没有变更需要提交"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 4
