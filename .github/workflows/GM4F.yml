name: GM4F 续期

on:
  schedule:
    - cron: '20 11 29 5 *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-renew:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取 workflow 仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}

      - name: 拉取私有仓库代码
        uses: actions/checkout@v4
        with:
          repository: 'aoi675145/scripts'          
          token: ${{ secrets.REPO_TOKEN }}
          sparse-checkout: |
            scripts/gm4/GM4F.py
          sparse-checkout-cone-mode: false
          path: private-scripts

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb curl
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase undetected-chromedriver requests

      - name: 执行续订脚本
        id: renew_run
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          set -o pipefail
          python -u private-scripts/scripts/gm4/GM4F.py 2>&1 | stdbuf -oL sed -E \
            -e 's#(https://g4f\.gg/)[^[:space:]'"'"'"<>]+#\1***#g' \
            -e 's#\bwbxl0\b#***#g' \
            -e 's#\b[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\b#***#g' \
            -e 's#bot[0-9]{6,}:[A-Za-z0-9_-]+#bot***#g' \
            -e 's#\b[0-9]{1,3}(\.[0-9]{1,3}){3}\b#***.***.***.***#g'

      - name: 提交 cron 更新
        if: always()
        run: |
          if git diff --quiet -- .github/workflows/GM4F.yml; then
            echo "[INFO] cron 未变化，跳过提交"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote set-url origin https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/${{ github.repository }}.git
            git add .github/workflows/GM4F.yml
            git commit -m "Update GM4F cron"
            git pull --rebase
            git push
          fi

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.REPO_TOKEN }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
