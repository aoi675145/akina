name: GM4F 续期

on:
  # schedule:
  #   - cron: '0 */3 * * *'      # every 90 min, part 1: 0:00, 3:00, 6:00...
  #   - cron: '30 1-23/3 * * *' # every 90 min, part 2: 1:30, 4:30, 7:30...
  workflow_dispatch:

jobs:
  run-renew:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取 workflow 仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}

      - name: 拉取私有仓库代码
        uses: actions/checkout@v4
        with:
          repository: 'aoi675145/scripts'          
          token: ${{ secrets.REPO_TOKEN }}
          sparse-checkout: |
            scripts/gm4/GM4F.py
          sparse-checkout-cone-mode: false
          path: private-scripts

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb curl unzip
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase undetected-chromedriver requests[socks]

      - name: 安装并启动固定代理
        env:
          GM4F_PROXY: ${{ secrets.GM4F_PROXY }}
        run: |
          if [ -z "$GM4F_PROXY" ]; then
            echo "[INFO] 未配置 GM4F_PROXY，直连模式"
            exit 0
          fi

          if [[ "$GM4F_PROXY" == hysteria2://* || "$GM4F_PROXY" == hy2://* ]]; then
            echo "[INFO] 配置 Hysteria2 代理"
            wget -q https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O hysteria
            chmod +x hysteria

            python3 << 'PYEOF'
          import json, os, sys
          from urllib.parse import parse_qs, unquote, urlparse

          url = os.environ.get("GM4F_PROXY", "").strip()
          parsed = urlparse(url)
          auth = unquote(parsed.username or "")
          if not auth or not parsed.hostname or not parsed.port:
              print("[ERROR] Hysteria2 节点解析失败")
              sys.exit(1)
          params = parse_qs(parsed.query)
          sni = params.get("sni", [parsed.hostname])[0]
          insecure = params.get("insecure", params.get("allowInsecure", ["0"]))[0].lower() in {"1", "true", "yes", "on"}
          server = f"{parsed.hostname}:{parsed.port}"
          with open("hy2.yaml", "w", encoding="utf-8") as f:
              f.write(f"server: {json.dumps(server)}\n")
              f.write(f"auth: {json.dumps(auth)}\n")
              f.write("tls:\n")
              f.write(f"  sni: {json.dumps(sni)}\n")
              f.write(f"  insecure: {'true' if insecure else 'false'}\n")
              f.write("socks5:\n")
              f.write("  listen: 127.0.0.1:10808\n")
          print(f"[INFO] Hysteria2 -> {parsed.hostname[:2]}***{parsed.hostname[-2:]}:{parsed.port}")
          PYEOF

            ./hysteria client -c hy2.yaml > hysteria.log 2>&1 &
            sleep 5

            echo "[INFO] 测试 Hysteria2 代理连接..."
            for i in 1 2 3 4 5; do
              if curl -x socks5h://127.0.0.1:10808 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
                echo "[INFO] ✅ Hysteria2 代理连接成功"
                echo "GM4F_PROXY_SOCKS5=socks5://127.0.0.1:10808" >> $GITHUB_ENV
                exit 0
              fi
              echo "[WARN] Hysteria2 尝试 $i/5..."
              sleep 3
            done

            echo "[ERROR] ❌ Hysteria2 代理连接失败"
            echo "--- Hysteria2 日志 ---"
            cat hysteria.log
            exit 1
          fi

          wget -q https://github.com/oyz6/action/releases/download/proxy/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray && chmod +x xray/xray

          python3 << 'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote, urlparse

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("GM4F_PROXY", "").strip()
          if not url:
              print("[ERROR] GM4F_PROXY 为空")
              sys.exit(1)

          if url.startswith("vless://"):
              protocol = "vless"
              content = url[8:]
          elif url.startswith("vmess://"):
              protocol = "vmess"
              content = url[8:]
          elif url.startswith("trojan://"):
              protocol = "trojan"
              content = url[9:]
          elif url.startswith("ss://"):
              protocol = "ss"
              content = url[5:]
          elif url.startswith("socks5://") or url.startswith("socks://"):
              content = url.split("://", 1)[1].split("#", 1)[0]
              server = content.split("@", 1)[1].split(":", 1)[0] if "@" in content else content.split(":", 1)[0]
              print(f"[INFO] SOCKS5 -> {mask(server)}")
              with open("use_external_socks.txt", "w") as f:
                  f.write(url.split("#", 1)[0])
              sys.exit(0)
          else:
              print(f"[ERROR] 不支持的协议: {url.split('://')[0]}")
              sys.exit(1)

          if "#" in content:
              content = content.rsplit("#", 1)[0]

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [
                  {"port": 10808, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}},
                  {"port": 10809, "listen": "127.0.0.1", "protocol": "http"}
              ],
              "outbounds": []
          }

          if protocol == "vless":
              uuid, rest = content.split("@", 1)
              host_port, params_str = rest.split("?", 1) if "?" in rest else (rest, "")
              address, port = host_port.rsplit(":", 1) if ":" in host_port else (host_port, "443")
              params = parse_qs(params_str)
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              flow = params.get("flow", [""])[0]
              pbk = params.get("pbk", [""])[0]
              sid = params.get("sid", [""])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              print(f"[INFO] VLESS -> {mask(address)}:{port} (security: {security}, network: {network})")
              outbound = {
                  "protocol": "vless",
                  "settings": {"vnext": [{"address": address, "port": int(port), "users": [{"id": uuid, "encryption": "none"}]}]},
                  "streamSettings": {"network": network, "security": security}
              }
              if flow:
                  outbound["settings"]["vnext"][0]["users"][0]["flow"] = flow
              if security == "reality":
                  outbound["streamSettings"]["realitySettings"] = {"serverName": sni, "fingerprint": fp, "publicKey": pbk}
                  if sid:
                      outbound["streamSettings"]["realitySettings"]["shortId"] = sid
              elif security == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {"serverName": sni, "fingerprint": fp, "allowInsecure": False}
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {"path": path, "headers": {"Host": host}}
              elif network == "grpc":
                  outbound["streamSettings"]["grpcSettings"] = {"serviceName": params.get("serviceName", [""])[0]}
              config["outbounds"].append(outbound)

          elif protocol == "vmess":
              padding = "=" * (-len(content) % 4)
              vm = json.loads(base64.b64decode(content + padding).decode("utf-8"))
              address = vm.get("add", "")
              port = int(vm.get("port", 443))
              network = vm.get("net", "tcp")
              tls = vm.get("tls", "")
              sni = vm.get("sni", "") or vm.get("host", address)
              host = vm.get("host", address)
              path = vm.get("path", "/")
              fp = vm.get("fp", "chrome")
              print(f"[INFO] VMess -> {mask(address)}:{port} (network: {network}, tls: {tls})")
              outbound = {
                  "protocol": "vmess",
                  "settings": {"vnext": [{"address": address, "port": port, "users": [{"id": vm.get("id", ""), "alterId": int(vm.get("aid", 0)), "security": "auto"}]}]},
                  "streamSettings": {"network": network, "security": "tls" if tls == "tls" else "none"}
              }
              if tls == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {"serverName": sni, "fingerprint": fp, "allowInsecure": False}
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {"path": path, "headers": {"Host": host}}
              config["outbounds"].append(outbound)

          elif protocol == "trojan":
              password, rest = content.split("@", 1)
              host_port, params_str = rest.split("?", 1) if "?" in rest else (rest, "")
              address, port = host_port.rsplit(":", 1) if ":" in host_port else (host_port, "443")
              params = parse_qs(params_str)
              sni = params.get("sni", [address])[0]
              network = params.get("type", ["tcp"])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              fp = params.get("fp", ["chrome"])[0]
              print(f"[INFO] Trojan -> {mask(address)}:{port} (network: {network})")
              outbound = {
                  "protocol": "trojan",
                  "settings": {"servers": [{"address": address, "port": int(port), "password": password}]},
                  "streamSettings": {"network": network, "security": "tls", "tlsSettings": {"serverName": sni, "fingerprint": fp, "allowInsecure": False}}
              }
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {"path": path, "headers": {"Host": host}}
              config["outbounds"].append(outbound)

          elif protocol == "ss":
              ss_url = urlparse(url)
              userinfo = ss_url.username or ""
              address = ss_url.hostname or ""
              port = ss_url.port
              if userinfo and address and port:
                  decoded_userinfo = unquote(userinfo)
                  if ":" not in decoded_userinfo:
                      decoded_userinfo = base64.urlsafe_b64decode(decoded_userinfo + "=" * (-len(decoded_userinfo) % 4)).decode("utf-8")
                  method, password = decoded_userinfo.split(":", 1)
              else:
                  raw = content.split("#", 1)[0].split("?", 1)[0]
                  decoded = base64.urlsafe_b64decode(raw + "=" * (-len(raw) % 4)).decode("utf-8")
                  user_part, server_part = decoded.rsplit("@", 1)
                  method, password = user_part.split(":", 1)
                  address, port = server_part.rsplit(":", 1)
              print(f"[INFO] Shadowsocks -> {mask(address)}:{port}")
              config["outbounds"].append({"protocol": "shadowsocks", "settings": {"servers": [{"address": address, "port": int(port), "method": method, "password": password}]}})

          with open("xray_config.json", "w") as f:
              json.dump(config, f, indent=2)
          print("[INFO] ✅ 代理配置已生成")
          PYEOF

          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "GM4F_PROXY_SOCKS5=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi

          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5

          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            if curl -x socks5h://127.0.0.1:10808 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "[INFO] ✅ 代理连接成功"
              echo "GM4F_PROXY_SOCKS5=socks5://127.0.0.1:10808" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 尝试 $i/5..."
            sleep 3
          done

          echo "[ERROR] ❌ 代理连接失败"
          echo "--- Xray 日志 ---"
          cat xray.log
          exit 1

      - name: 执行续订脚本
        id: renew_run
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GM4F_PROXY: ${{ env.GM4F_PROXY_SOCKS5 }}
        run: |
          set -o pipefail
          python -u private-scripts/scripts/gm4/GM4F.py 2>&1 | stdbuf -oL sed -E \
            -e 's#(https://g4f\.gg/)[^[:space:]'"'"'"<>]+#\1***#g' \
            -e 's#\bwbxl0\b#***#g' \
            -e 's#\b[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\b#***#g' \
            -e 's#bot[0-9]{6,}:[A-Za-z0-9_-]+#bot***#g' \
            -e 's#\b[0-9]{1,3}(\.[0-9]{1,3}){3}\b#***.***.***.***#g'

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.REPO_TOKEN }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
