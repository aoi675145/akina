name: GreatHost Auto Renew

on: 
  schedule:
    - cron: '5 */12 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: 📥 检出私有代码
      uses: actions/checkout@v4
      with:
        repository: 'akina005/scripts'
        token: ${{ secrets.REPO_TOKEN }}

    - name: 🟢 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 💾 Cache Cookies
      uses: actions/cache@v3
      with:
        path: /tmp/greathost_cookies.json
        key: greathost-cookies-${{ github.run_number }}
        restore-keys: |
          greathost-cookies-

    - name: 📦 Install dependencies
      working-directory: scripts/greathost
      run: |
        # 兼容处理：如果有 requirements.txt 就用它，没有就直接装依赖
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        else
          pip install playwright requests
        fi
        playwright install chromium

    - name: 🌐 Install and Start Proxy
      env:
        GREATHOST_PROXY: ${{ secrets.GREATHOST_PROXY }}
      run: |
        if [ -z "$GREATHOST_PROXY" ]; then
          echo "[INFO] 未配置代理，直连模式"
          echo "GREATHOST_PROXY_STATUS=网络模式：直连 ⚠️（未配置代理）" >> $GITHUB_ENV
          exit 0
        fi

        if ! wget -q https://github.com/akina005/akina/releases/download/proxy/Xray-linux-64.zip; then
          echo "[WARN] Xray 下载失败，直连模式"
          echo "GREATHOST_PROXY_STATUS=网络模式：直连 ⚠️（代理组件下载失败）" >> $GITHUB_ENV
          exit 0
        fi

        if ! unzip -q Xray-linux-64.zip -d xray || ! chmod +x xray/xray; then
          echo "[WARN] Xray 解压失败，直连模式"
          echo "GREATHOST_PROXY_STATUS=网络模式：直连 ⚠️（代理组件解压失败）" >> $GITHUB_ENV
          exit 0
        fi

        set +e
        python3 << 'PYEOF'
        import os, sys, json, base64
        from urllib.parse import parse_qs, unquote

        def mask(s):
            return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

        url = os.environ.get("GREATHOST_PROXY", "").strip()
        if url.startswith("vless://"):
            protocol = "vless"
            content = url[8:]
        elif url.startswith("vmess://"):
            protocol = "vmess"
            content = url[8:]
        else:
            print(f"[WARN] 不支持的代理协议: {url.split('://')[0] if '://' in url else 'unknown'}，直连模式")
            sys.exit(2)

        if "#" in content:
            content = content.rsplit("#", 1)[0]

        config = {
            "log": {"loglevel": "warning"},
            "inbounds": [
                {"port": 1080, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}}
            ],
            "outbounds": []
        }

        if protocol == "vless":
            uuid, rest = content.split("@", 1)
            if "?" in rest:
                host_port, params_str = rest.split("?", 1)
            else:
                host_port, params_str = rest, ""

            if ":" in host_port:
                address, port = host_port.rsplit(":", 1)
            else:
                address, port = host_port, "443"

            params = parse_qs(params_str)
            security = params.get("security", ["none"])[0]
            network = params.get("type", ["tcp"])[0]
            sni = params.get("sni", [address])[0]
            fp = params.get("fp", ["chrome"])[0]
            flow = params.get("flow", [""])[0]
            pbk = params.get("pbk", [""])[0]
            host = params.get("host", [sni])[0]
            path = unquote(params.get("path", ["/"])[0])

            print(f"[INFO] VLESS -> {mask(address)}:{port} (security: {security}, network: {network})")

            outbound = {
                "protocol": "vless",
                "settings": {
                    "vnext": [{
                        "address": address,
                        "port": int(port),
                        "users": [{"id": uuid, "encryption": "none"}]
                    }]
                },
                "streamSettings": {"network": network, "security": security}
            }

            if flow:
                outbound["settings"]["vnext"][0]["users"][0]["flow"] = flow

            if security == "reality":
                outbound["streamSettings"]["realitySettings"] = {
                    "serverName": sni,
                    "fingerprint": fp,
                    "publicKey": pbk
                }
            elif security == "tls":
                outbound["streamSettings"]["tlsSettings"] = {
                    "serverName": sni,
                    "fingerprint": fp,
                    "allowInsecure": False
                }

            if network == "ws":
                outbound["streamSettings"]["wsSettings"] = {
                    "path": path,
                    "headers": {"Host": host}
                }
            elif network == "grpc":
                outbound["streamSettings"]["grpcSettings"] = {
                    "serviceName": params.get("serviceName", [""])[0]
                }

            config["outbounds"].append(outbound)

        elif protocol == "vmess":
            try:
                padding = 4 - len(content) % 4
                if padding != 4:
                    content += "=" * padding
                decoded = base64.b64decode(content).decode("utf-8")
                vm = json.loads(decoded)
            except Exception as e:
                print(f"[WARN] VMess 解析失败: {e}，直连模式")
                sys.exit(2)

            address = vm.get("add", "")
            port = int(vm.get("port", 443))
            uuid = vm.get("id", "")
            aid = int(vm.get("aid", 0))
            network = vm.get("net", "tcp")
            tls = vm.get("tls", "")
            sni = vm.get("sni", "") or vm.get("host", address)
            host = vm.get("host", address)
            path = vm.get("path", "/")
            fp = vm.get("fp", "chrome")

            print(f"[INFO] VMess -> {mask(address)}:{port} (network: {network}, tls: {tls})")

            outbound = {
                "protocol": "vmess",
                "settings": {
                    "vnext": [{
                        "address": address,
                        "port": port,
                        "users": [{"id": uuid, "alterId": aid, "security": "auto"}]
                    }]
                },
                "streamSettings": {
                    "network": network,
                    "security": "tls" if tls == "tls" else "none"
                }
            }

            if tls == "tls":
                outbound["streamSettings"]["tlsSettings"] = {
                    "serverName": sni,
                    "fingerprint": fp,
                    "allowInsecure": False
                }

            if network == "ws":
                outbound["streamSettings"]["wsSettings"] = {
                    "path": path,
                    "headers": {"Host": host}
                }

            config["outbounds"].append(outbound)

        with open("xray_config.json", "w") as f:
            json.dump(config, f, indent=2)

        print("[INFO] ✅ 代理配置已生成")
        PYEOF
        proxy_status=$?
        set -e
        if [ "$proxy_status" -ne 0 ]; then
          echo "[INFO] 代理配置不可用，直连模式"
          echo "GREATHOST_PROXY_STATUS=网络模式：直连 ⚠️（代理配置不可用）" >> $GITHUB_ENV
          exit 0
        fi

        ./xray/xray run -c xray_config.json > xray.log 2>&1 &
        sleep 5

        echo "[INFO] 测试代理连接..."
        for i in 1 2 3 4 5; do
          if curl -x socks5://127.0.0.1:1080 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
            echo "[INFO] ✅ 代理连接成功"
            echo "GREATHOST_BROWSER_PROXY=socks5://127.0.0.1:1080" >> $GITHUB_ENV
            echo "GREATHOST_PROXY_STATUS=网络模式：代理" >> $GITHUB_ENV
            exit 0
          fi
          echo "[WARN] 尝试 $i/5..."
          sleep 3
        done

        echo "[WARN] 代理连接失败，改用直连模式"
        echo "GREATHOST_PROXY_STATUS=网络模式：直连 ⚠️（代理连接失败）" >> $GITHUB_ENV
        cat xray.log || true
        exit 0

    - name: 🚀 Run Auto Renew
      working-directory: scripts/greathost
      env:
        GREATHOST: ${{ secrets.GREATHOST }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        GREATHOST_BROWSER_PROXY: ${{ env.GREATHOST_BROWSER_PROXY }}
        GREATHOST_PROXY_STATUS: ${{ env.GREATHOST_PROXY_STATUS }}
      run: |
        python greathost.py

    - name: 🧹 Clean Workflow Runs
      if: always()
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        delete_workflow_pattern: ${{ github.workflow }}
        retain_days: 0
        keep_minimum_runs: 4
