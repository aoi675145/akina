name: FalixNodes 重启

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定邮箱（留空全部，多个用逗号）'
        required: false
      retry:
        description: '是否为一次性重试运行'
        required: false
        default: 'false'
#  schedule:
#    - cron: '0 */6 * * *'  # 每 6 小时执行一次

jobs:
  restart:
    name: 执行脚本
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          repository: 'aoi675145/scripts'  
          token: ${{ secrets.REPO_TOKEN }}

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xz-utils
          curl -L -o /tmp/ffmpeg.tar.xz https://github.com/aoi675145/akina/releases/download/ffmpeg/ffmpeg-release-amd64-static.tar.xz
          mkdir -p /tmp/ffmpeg-static
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg-static --strip-components=1
          sudo ln -sf /tmp/ffmpeg-static/ffmpeg /usr/local/bin/ffmpeg
          sudo ln -sf /tmp/ffmpeg-static/ffprobe /usr/local/bin/ffprobe
          ffmpeg -version
          pip install -q seleniumbase requests pyvirtualdisplay

      - name: 配置代理 (VLESS)
        env:
          Falix_PROXY_NODE: ${{ secrets.Falix_PROXY_NODE }}
        run: |
          if [ -z "$Falix_PROXY_NODE" ]; then
            echo "[INFO] 无代理配置，使用直连模式"
            exit 0
          fi
          
          echo "[INFO] 下载并配置 Xray-core (VLESS)"
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O xray.zip
          unzip -q xray.zip xray
          chmod +x xray
          
          # 解析 VLESS 链接并生成配置
          python -c '
          import os, urllib.parse, json
          
          link = os.environ.get("Falix_PROXY_NODE", "").strip()
          if not link.startswith("vless://"):
              print("ERROR: 不是有效的 VLESS 链接，请检查变量内容")
              exit(1)
          
          parsed = urllib.parse.urlparse(link)
          uuid = parsed.username
          host = parsed.hostname
          port = int(parsed.port or 443)
          params = dict(urllib.parse.parse_qsl(parsed.query))
          
          outbound = {
              "protocol": "vless",
              "settings": {
                  "vnext": [{
                      "address": host,
                      "port": port,
                      "users": [{"id": uuid, "encryption": params.get("encryption", "none"), "flow": params.get("flow", "")}]
                  }]
              },
              "streamSettings": {
                  "network": params.get("type", "tcp"),
                  "security": params.get("security", "none")
              }
          }
          
          if params.get("security") == "tls":
              outbound["streamSettings"]["tlsSettings"] = {
                  "serverName": params.get("sni", host),
                  "fingerprint": params.get("fp", "chrome")
              }
          elif params.get("security") == "reality":
              outbound["streamSettings"]["realitySettings"] = {
                  "serverName": params.get("sni", host),
                  "publicKey": params.get("pbk", ""),
                  "fingerprint": params.get("fp", "chrome"),
                  "shortId": params.get("sid", ""),
                  "spiderX": params.get("spx", "")
              }
          
          if params.get("type") == "ws":
              outbound["streamSettings"]["wsSettings"] = {
                  "path": params.get("path", "/"),
                  "headers": {"Host": params.get("host", host)}
              }
          elif params.get("type") == "grpc":
              outbound["streamSettings"]["grpcSettings"] = {
                  "serviceName": params.get("serviceName", ""),
                  "multiMode": params.get("mode", "multi") != "gun"
              }
          
          config = {
              "inbounds": [{
                  "port": 1080,
                  "listen": "127.0.0.1",
                  "protocol": "http",
                  "settings": {}
              }],
              "outbounds": [outbound]
          }
          
          with open("config.json", "w") as f:
              json.dump(config, f, indent=2)
          '
          
          ./xray -c config.json > /dev/null 2>&1 &
          sleep 3
          echo "[INFO] VLESS 代理已启动"

      - name: 执行重启脚本
        id: falix_run
        continue-on-error: true
        env:
          FALIX: ${{ secrets.FALIX }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          Falix_PROXY_NODE: ${{ secrets.Falix_PROXY_NODE }}
          FALIX_RETRY_RUN: ${{ github.event.inputs.retry == 'true' && 'true' || 'false' }}
        run: |
          # 根据是否有 Falix_PROXY_NODE 设置代理
          if [ -n "$Falix_PROXY_NODE" ]; then
            export PROXY_SERVER="http://127.0.0.1:1080"
            echo "[INFO] 使用代理: $PROXY_SERVER"
          else
            echo "[INFO] 直连模式"
          fi
          
          # 进入私库对应的目录并执行
          cd scripts/Falix
          python main.py

      - name: 失败后重开一次工作流
        if: steps.falix_run.outcome == 'failure' && github.event.inputs.retry != 'true'
        env:
          GH_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          gh workflow run "${{ github.workflow }}" \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}" \
            -f retry=true \
            -f accounts="${{ github.event.inputs.accounts }}"
          exit 1

      - name: 重试后仍失败则停止
        if: steps.falix_run.outcome == 'failure' && github.event.inputs.retry == 'true'
        run: |
          echo "[ERROR] Falix 第二轮 15 次仍未成功，已停止自动重试。"
          exit 1

#      - name: 上传截图
#        if: always()
#        uses: actions/upload-artifact@v4
#        with:
#          name: screenshots-${{ github.run_number }}
#          path: output/falix/*.png
#          retention-days: 7
#          if-no-files-found: ignore

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.REPO_TOKEN }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
